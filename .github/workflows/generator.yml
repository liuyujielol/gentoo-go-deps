name: Build Clash Verge Rev Web

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '要检出的 Tag（例如 v1.8.0）'
        required: true
        type: string

permissions:
  contents: write   # 需要创建 Release 和上传资产

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Clash Verge Rev
        uses: actions/checkout@v4
        with:
          repository: clash-verge-rev/clash-verge-rev
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web (pnpm web:build)
        run: pnpm web:build

      - name: Compress dist to tar.xz
        run: |
          tar --create --auto-compress --file /tmp/clash-verge-rev-${{ inputs.tag }}-web.tar.xz ./dist
          ls -lh /tmp/clash-verge-rev-${{ inputs.tag }}-web.tar.xz

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: clash-verge-rev-${{ inputs.tag }}
          name: Clash Verge Rev Web ${{ inputs.tag }}
          body: |
            **Clash Verge Rev Web 构建**
            
            - Tag: `${{ inputs.tag }}`
            - Build Date: ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: false
          files: clash-verge-rev-web-${{ inputs.tag }}.tar.xz
